# vsftpd configuration for the "Anonymous FTP Access" game.
#
# Intentionally misconfigured: anonymous login is enabled and the anonymous
# root exposes a sensitive file. Local-user login and all writes are disabled,
# so the ONLY thing an attacker can do is read what the operator carelessly
# left in the public directory.
#
# Standalone (foreground) mode is required because the target container has no
# systemd/inetd to socket-activate vsftpd; it is launched directly by the
# playbook. A fixed passive-port range with a fixed pasv_address is required so
# the FTP data channel survives Docker port publishing (NAT): without it the
# control connection succeeds but every file transfer stalls.
listen=YES
listen_ipv6=NO

# --- The vulnerability: unauthenticated read access -----------------------
anonymous_enable=YES
no_anon_password=YES
anon_root=/var/ftp

# --- Everything else locked down (read-only, no local users) --------------
local_enable=NO
write_enable=NO
anon_upload_enable=NO
anon_mkdir_write_enable=NO
anon_other_write_enable=NO
hide_ids=YES

# --- Passive data channel, pinned so it works through Docker NAT ----------
pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30009
pasv_address=127.0.0.1

# --- Container-friendliness ------------------------------------------------
# seccomp_sandbox trips up on some container kernels; disabling keeps vsftpd
# from dying mid-transfer. secure_chroot_dir is normally created by
# systemd-tmpfiles at boot — this container has none, so the playbook creates
# it explicitly (see setup.yml).
seccomp_sandbox=NO
secure_chroot_dir=/var/run/vsftpd/empty
