---
# Game: SSH Weak Password Attack (v3) — Crestwood University
#
# The shared "itstaff" helpdesk account at Crestwood University uses a password
# matching the university's unofficial convention: OrgName + Year.  This account
# appears in a campus-themed wordlist, so it falls to a hydra dictionary attack.
# The flag is an exported helpdesk ticket in the account's home directory.
- name: Deploy SSH Weak Password (v3) scenario — Crestwood University
  hosts: cyberrange
  vars:
    op_user: itstaff
    op_password: "Campus2024"
    flag_content: "WMG{c4mpus_pw_t00_pr3d1ct4bl3}"

  tasks:
    - name: Ensure sshd allows password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'

    - name: Create IT helpdesk staff account
      ansible.builtin.user:
        name: "{{ op_user }}"
        shell: /bin/bash
        create_home: yes
        comment: "Crestwood University — IT Helpdesk Staff"
        state: present

    - name: Set IT staff password to a weak institutional value (intentional vulnerability)
      ansible.builtin.shell: "echo '{{ op_user }}:{{ op_password }}' | chpasswd"
      changed_when: false

    - name: Deploy campus password wordlist for dictionary attack
      ansible.builtin.copy:
        src: files/wordlist.txt
        dest: "/home/{{ op_user }}/campus-passwords.txt"
        owner: "{{ op_user }}"
        group: "{{ op_user }}"
        mode: '0644'

    - name: Plant the flag in the IT staff home directory
      ansible.builtin.copy:
        content: "{{ flag_content }}\n"
        dest: "/home/{{ op_user }}/ticket-export.txt"
        owner: "{{ op_user }}"
        group: "{{ op_user }}"
        mode: '0600'

    - name: Restrict IT staff home directory to owner only
      ansible.builtin.file:
        path: "/home/{{ op_user }}"
        owner: "{{ op_user }}"
        group: "{{ op_user }}"
        mode: '0700'
