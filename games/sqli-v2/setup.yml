---
# Game: SQL Injection (v2) — UNION-based data extraction
#
# Athenaeum Digital Library exposes a book-catalogue search that concatenates
# the search term straight into a SQL query. The result set has two columns,
# making it a textbook UNION-based injection: an attacker appends
# `UNION SELECT ... FROM librarian_notes` to pull the flag out of a table that
# is never meant to be reachable from the search feature.
- name: Deploy SQL Injection (v2) — Library Catalogue scenario
  hosts: cyberrange
  vars:
    db_dir: /var/www/db
    db_path: /var/www/db/library.db
    flag_content: "WMG{un10n_b4s3d_sql1_l34ks_th3_db}"

  tasks:
    - name: Install Apache, PHP and PHP-SQLite3 extension
      ansible.builtin.apt:
        name:
          - apache2
          - php
          - libapache2-mod-php
          - php-sqlite3
        state: present
        update_cache: yes

    - name: Create database directory owned by www-data
      ansible.builtin.file:
        path: "{{ db_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0750'

    - name: Initialise SQLite database with books and librarian_notes tables
      # Python 3 is already present on Ubuntu 22.04; no extra package needed.
      # INSERT OR IGNORE keeps this idempotent on repeated runs.
      ansible.builtin.shell: |
        python3 - << 'EOF'
        import sqlite3
        conn = sqlite3.connect('{{ db_path }}')
        c = conn.cursor()
        c.execute('''CREATE TABLE IF NOT EXISTS books
                     (id INTEGER PRIMARY KEY, title TEXT NOT NULL, author TEXT NOT NULL)''')
        books = [
            (1, 'The Silent Sea',        'Marina Holt'),
            (2, 'Cartography of Dreams', 'Idris Vale'),
            (3, 'The Last Lighthouse',   'Eleanor Frost'),
            (4, 'Gears of the Republic', 'Tomas Bright'),
            (5, 'Whispering Pines',      'Ada Coleridge'),
        ]
        c.executemany("INSERT OR IGNORE INTO books (id,title,author) VALUES (?,?,?)", books)
        c.execute('''CREATE TABLE IF NOT EXISTS librarian_notes
                     (id INTEGER PRIMARY KEY, note TEXT NOT NULL)''')
        c.execute("INSERT OR IGNORE INTO librarian_notes (id,note) VALUES (1,'{{ flag_content }}')")
        conn.commit()
        conn.close()
        EOF
      changed_when: false

    - name: Set database file ownership so www-data can read it
      ansible.builtin.file:
        path: "{{ db_path }}"
        owner: www-data
        group: www-data
        mode: '0640'

    - name: Deploy the vulnerable PHP catalogue search page
      ansible.builtin.copy:
        src: files/search.php
        dest: /var/www/html/search.php
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Check whether Apache is already running
      ansible.builtin.command: pgrep -x apache2
      register: apache_running
      changed_when: false
      failed_when: false

    - name: Start Apache (first run only)
      ansible.builtin.command: apache2ctl start
      when: apache_running.rc != 0

    - name: Restart Apache to activate PHP module
      ansible.builtin.service:
        name: apache2
        state: restarted

    - name: Wait for port 80 to accept connections
      ansible.builtin.wait_for:
        port: 80
        host: 127.0.0.1
        timeout: 15
