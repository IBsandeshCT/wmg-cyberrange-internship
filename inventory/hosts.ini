[cyberrange]
target ansible_host=127.0.0.1 ansible_port=2222 ansible_user=root ansible_password=root ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' ansible_python_interpreter=/usr/bin/python3

# NOTE: the target container is built from docker/Dockerfile.target (Ubuntu 22.04 +
# openssh-server + python3). An earlier attempt used rastasheep/ubuntu-sshd:18.04,
# but that image ships only Python 3.6.5, which is too old for ansible-core 2.21
# (its modules require Python >=3.9 on managed nodes). Ubuntu 22.04 ships Python
# 3.10 by default, which satisfies that requirement with no extra bootstrap step.
